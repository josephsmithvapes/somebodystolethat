<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#0f0e0c" rx="4"/>
  <!-- Dollar sign -->
  <text x="16" y="22" font-family="Georgia,serif" font-size="20" font-weight="900" fill="#b91c1c" text-anchor="middle">$</text>
  <!-- Diagonal slash / warning mark -->
  <line x1="6" y1="6" x2="26" y2="26" stroke="#f8f6f1" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
</svg>
